<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SymptomTrack — external memory for symptoms and medications.">
  <meta name="theme-color" content="#000000">
  <title>SymptomTrack</title>
  <link rel="icon" href="assets/icon-1024.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icon-1024.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <div class="wrap">
    <header class="site-header">
      <a class="brand" href="#top">
        <img src="assets/logo.png" width="40" height="40" alt="">
        <span>SymptomTrack</span>
      </a>
      <div class="lang-switch" role="group" aria-label="Language">
        <button type="button" id="btn-en" class="active">EN</button>
        <button type="button" id="btn-es">ES</button>
      </div>
    </header>

    <main id="top">
      <section class="hero glass" aria-labelledby="hero-title">
        <img class="hero-logo" src="assets/logo.png" width="88" height="88" alt="SymptomTrack">
        <h1 id="hero-title">SymptomTrack</h1>
        <p class="tagline" data-i18n="tagline"></p>
        <p class="sub" data-i18n="sub"></p>
        <a class="btn-app-store" href="https://apps.apple.com/jp/app/symptomtrack/id6751636595?l=en-US" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          <span data-i18n="download"></span>
        </a>
      </section>

      <section class="glass" aria-labelledby="what-title">
        <div class="section-inner">
          <h2 id="what-title" data-i18n="whatTitle"></h2>
          <ul class="feature-list">
            <li data-i18n="f1"></li>
            <li data-i18n="f2"></li>
            <li data-i18n="f3"></li>
            <li data-i18n="f4"></li>
            <li data-i18n="f5"></li>
          </ul>
        </div>
      </section>

      <section class="glass" aria-labelledby="shots-title">
        <div class="section-inner">
          <h2 id="shots-title" data-i18n="shotsTitle"></h2>
          <div class="shots">
            <div>
              <div class="shot">
                <img src="assets/icon-1024.png" alt="" width="320" height="320">
              </div>
              <p class="shot-caption" data-i18n="shotCaption"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="glass" aria-labelledby="who-title">
        <div class="section-inner">
          <h2 id="who-title" data-i18n="whoTitle"></h2>
          <p data-i18n="whoBody"></p>
          <p class="tier-note" data-i18n="whoCredit"></p>
        </div>
      </section>

      <section class="glass" aria-labelledby="tiers-title">
        <div class="section-inner">
          <h2 id="tiers-title" data-i18n="tiersTitle"></h2>
          <div class="tier-grid">
            <div class="tier">
              <h3 data-i18n="freeTitle"></h3>
              <ul>
                <li data-i18n="free1"></li>
                <li data-i18n="free2"></li>
                <li data-i18n="free3"></li>
              </ul>
            </div>
            <div class="tier">
              <h3 data-i18n="premiumTitle"></h3>
              <ul>
                <li data-i18n="premium1"></li>
                <li data-i18n="premium2"></li>
              </ul>
            </div>
          </div>
          <p class="tier-note" data-i18n="tierNote"></p>
        </div>
      </section>

      <section class="glass" aria-labelledby="video-title">
        <div class="section-inner">
          <h2 id="video-title" data-i18n="videoTitle"></h2>
          <div class="video-placeholder" data-i18n="videoSoon"></div>
        </div>
      </section>

      <section class="glass" aria-labelledby="help-title">
        <div class="section-inner">
          <h2 id="help-title" data-i18n="helpTitle"></h2>
          <p data-i18n="helpBody"></p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a class="btn-app-store" href="https://apps.apple.com/jp/app/symptomtrack/id6751636595?l=en-US" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <span data-i18n="download"></span>
      </a>
      <nav class="footer-links" aria-label="Legal">
        <a id="legal-link" href="https://rvbservices.wixsite.com/babenberg-studies/legal" rel="noopener" data-i18n="legalPrivacy"></a>
        <a id="contact-link" href="mailto:contact@babenberg-studies.com" data-i18n="contact"></a>
      </nav>
      <p data-i18n="disclaimer"></p>
      <p data-i18n="copyright"></p>
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
